let editOuvr=null,_ouvrPhotoTmp=null,_ocatOpen=false;
function ouvrCatList(){return [...new Set([...ouvrCats,...ouvrages.map(o=>o.cat||'Autres'),editOuvr&&editOuvr.cat].filter(Boolean))];}
function _ocatPick(c){editOuvr.cat=c;_ocatOpen=false;drawOuvrForm();}
function _addOuvrCat(){const i=document.getElementById('newOuvrCatInput');const n=(i?i.value:'').trim();if(!n)return;if(!ouvrCats.includes(n))ouvrCats.push(n);editOuvr.cat=n;_ocatOpen=false;drawOuvrForm();saveState();}
function delOuvrCat(c){if(c==='Autres'){toast('La catégorie « Autres » ne peut pas être supprimée','info','ti-alert-circle');return;}const used=ouvrages.filter(o=>(o.cat||'Autres')===c).length;if(used>0&&!confirm('Supprimer « '+c+' » ? Ses '+used+' ouvrage(s) iront dans « Autres ».'))return;ouvrCats=ouvrCats.filter(x=>x!==c);ouvrages.forEach(o=>{if((o.cat||'Autres')===c)o.cat='Autres';});if(!ouvrCats.includes('Autres'))ouvrCats.push('Autres');if(editOuvr&&editOuvr.cat===c)editOuvr.cat='Autres';_ocatOpen=false;drawOuvrForm();saveState();toast('Catégorie supprimée','info','ti-trash');}
function nouvelOuvrage(){_ocatOpen=false;editOuvr={id:null,nom:'',desc:'',cat:'Préparation',unite:'m²',h:0.5,four:[],photo:'',icon:'ti-tools'};modal('<div id="ouvrForm"></div>');drawOuvrForm();}
function editOuvrage(id){const o=ouvr(id);if(!o)return;_ocatOpen=false;editOuvr={id:o.id,nom:o.nom,desc:o.desc||'',cat:o.cat,unite:o.unite,h:o.h,four:o.four.map(f=>({fid:f.fid,qte:f.qte})),photo:o.photo||'',icon:o.icon||'ti-tools'};modal('<div id="ouvrForm"></div>');drawOuvrForm();}
function delOuvrage(id){const o=ouvr(id);if(!o)return;if(confirm("Supprimer l'ouvrage « "+o.nom+" » ?")){ouvrages=ouvrages.filter(x=>x.id!==id);render();toast('Ouvrage supprimé','info','ti-trash');}}
function _ouvrPhotoPick(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const max=400;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));const cw=Math.round(w*sc),ch=Math.round(h*sc);const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;cv.getContext('2d').drawImage(img,0,0,cw,ch);editOuvr.photo=cv.toDataURL('image/jpeg',0.82);drawOuvrForm();};img.src=ev.target.result;};r.readAsDataURL(f);}
function ouvrAddFour(){editOuvr.four.push({fid:catFournitures[0].id,qte:1});drawOuvrForm();}
function ouvrDelFour(i){editOuvr.four.splice(i,1);drawOuvrForm();}
function ouvrSetFour(i,k,v){editOuvr.four[i][k]=k==='qte'?_pf(v):v;drawOuvrForm();}
function ouvrPreview(){const e=editOuvr;const mo=(e.h||0)*tauxMO;const fo=e.four.reduce((a,f)=>a+((catF(f.fid)||{pu:0}).pu)*(f.qte||0),0);return Math.round(mo+fo);}
function ouvrPrevCost(){const e=editOuvr;const mo=(e.h||0)*coutMO;const fo=e.four.reduce((a,f)=>a+((catF(f.fid)||{achat:0}).achat||0)*(f.qte||0),0);return Math.round(mo+fo);}
function _ouvrMajPrix(){const v=ouvrPreview(),c=ouvrPrevCost(),m=v-c,pct=v>0?Math.round(m/v*100):0;const a=document.getElementById('ouvrPx');if(a)a.textContent=v+' €';const b=document.getElementById('ouvrDeb');if(b)b.textContent=c+' €';const d=document.getElementById('ouvrMarge');if(d){d.textContent=(m>=0?'+':'')+m+' € ('+pct+'%)';d.style.color=m>=0?'var(--olive)':'var(--alerte)';}}
let _pickQ='',_pickCat='';
function ouvrPickProduct(){_pickQ='';_pickCat='';const o=document.createElement('div');o.className='overlay';o.id='pickOv';o.innerHTML='<div class="modal" id="pickModal"></div>';o.addEventListener('click',e=>{if(e.target===o)o.remove();});document.body.appendChild(o);drawPick();}
function _pickFiltered(){const q=_pickQ.toLowerCase().trim();return catFournitures.filter(p=>(!_pickCat||(p.cat||'Divers')===_pickCat)&&(!q||(p.nom||'').toLowerCase().includes(q)));}
function _pickRenderList(){const el=document.getElementById('pickList');if(!el)return;const items=_pickFiltered();el.innerHTML=items.length?items.map(p=>`<button onclick="ouvrAddFourId('${p.id}')" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;font-family:inherit"><span style="width:36px;height:36px;border-radius:8px;background:rgba(243,146,0,.14);color:var(--orange-dark);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0">${(p.nom||'?').trim().charAt(0).toUpperCase()}</span><span style="flex:1;min-width:0"><span style="font-weight:600;font-size:13.5px;display:block">${p.nom}</span><span class="tiny" style="color:var(--ink-3)">${p.cat||'Divers'}</span></span><span style="font-weight:800;color:var(--orange-dark);white-space:nowrap">${p.pu} €<span class="tiny" style="color:var(--ink-3)">/${p.u}</span></span></button>`).join(''):'<div class="tiny" style="color:var(--ink-3);text-align:center;padding:24px">Aucun produit trouvé</div>';}
function drawPick(){const m=document.getElementById('pickModal');if(!m)return;const cats=[...new Set([...prodCats,...catFournitures.map(p=>p.cat||'Divers')])].filter(c=>catFournitures.some(p=>(p.cat||'Divers')===c));
  m.innerHTML=`<div class="modal-head"><h3>Choisir un produit</h3><button class="icon-x" onclick="document.getElementById('pickOv').remove()"><i class="ti ti-x"></i></button></div><div class="modal-body">
    <input class="cell" id="pickSearch" value="${(_pickQ||'').replace(/"/g,'&quot;')}" placeholder="Rechercher un produit…" oninput="_pickQ=this.value;_pickRenderList()" style="margin-bottom:10px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"><button class="btn sm ${_pickCat?'':'primary'}" onclick="_pickCat='';drawPick()">Toutes</button>${cats.map(c=>`<button class="btn sm ${_pickCat===c?'primary':''}" data-c="${c.replace(/"/g,'&quot;')}" onclick="_pickCat=this.dataset.c;drawPick()">${c}</button>`).join('')}</div>
    <div id="pickList" style="max-height:44vh;overflow:auto;margin:0 -4px;padding:0 4px"></div>
  </div>`;
  _pickRenderList();
  const si=document.getElementById('pickSearch');if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}
function ouvrAddFourId(fid){editOuvr.four.push({fid,qte:1});const o=document.getElementById('pickOv');if(o)o.remove();drawOuvrForm();}
function drawOuvrForm(){
  const e=editOuvr,esc=s=>(s||'').replace(/"/g,'&quot;');
  document.getElementById('ouvrForm').innerHTML=`
  <div class="modal-head"><h3>${e.id?"Modifier l'ouvrage":"Nouvel ouvrage"}</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div style="display:flex;gap:14px;margin-bottom:8px">
      <div style="width:84px;height:84px;border-radius:12px;flex-shrink:0;${e.photo?`background:url(${e.photo});background-size:cover;background-position:center`:'background:rgba(243,146,0,.12)'};display:flex;align-items:center;justify-content:center;color:var(--orange)">${e.photo?'':'<i class="ti ti-tools" style="font-size:28px"></i>'}</div>
      <div style="flex:1"><div class="field" style="margin:0"><label>Nom de l'ouvrage</label><input value="${esc(e.nom)}" oninput="editOuvr.nom=this.value" placeholder="Ex. Dépose de couverture"></div>
      <input type="file" id="ouvrPhotoInput" accept="image/*" style="display:none" onchange="_ouvrPhotoPick(this)">
      <button class="btn sm ghost" style="margin-top:8px" onclick="document.getElementById('ouvrPhotoInput').click()"><i class="ti ti-camera"></i> Photo</button></div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="field" style="flex:2"><label>Catégorie</label>
        <button type="button" onclick="_ocatOpen=!_ocatOpen;drawOuvrForm()" class="cell" style="display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;background:var(--surface);text-align:left"><span style="font-weight:600">${e.cat||'Choisir…'}</span><i class="ti ti-chevron-${_ocatOpen?'up':'down'}" style="color:var(--ink-3)"></i></button>
        ${_ocatOpen?`<div style="border:1px solid var(--line);border-radius:11px;margin-top:6px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.12);max-height:260px;overflow-y:auto">
          ${ouvrCatList().map(c=>`<div style="display:flex;align-items:center;border-bottom:1px solid var(--line);${c===e.cat?'background:rgba(243,146,0,.1)':''}"><button type="button" data-c="${esc(c)}" onclick="_ocatPick(this.dataset.c)" style="flex:1;text-align:left;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:${c===e.cat?'700':'500'};cursor:pointer;color:var(--ink);padding:10px 12px">${c===e.cat?'<i class="ti ti-check" style="color:var(--orange)"></i> ':''}${c}</button><button type="button" data-c="${esc(c)}" onclick="delOuvrCat(this.dataset.c)" style="border:none;background:none;color:var(--ink-3);cursor:pointer;padding:8px 12px" title="Supprimer cette catégorie"><i class="ti ti-trash" style="font-size:14px"></i></button></div>`).join('')}
          <div style="display:flex;gap:6px;padding:9px 12px;background:var(--surface-2)"><input class="cell" id="newOuvrCatInput" placeholder="Nouvelle catégorie…" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();_addOuvrCat()}"><button type="button" class="btn sm primary" onclick="_addOuvrCat()"><i class="ti ti-plus"></i> Ajouter</button></div>
        </div>`:''}
      </div>
      <div class="field" style="flex:1"><label>Unité de l'ouvrage</label><select onchange="editOuvr.unite=this.value;drawOuvrForm()">${['m²','ml','u','forf.'].map(u=>`<option ${e.unite===u?'selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Description générique <span style="font-weight:400;color:var(--ink-3)">— apparaît sur le devis, modifiable au cas par cas</span></label><textarea oninput="editOuvr.desc=this.value" rows="2" placeholder="Ex. Fourniture et pose d'une gouttière demi-ronde zinc D33, façonnage compris, évacuation des déchets." style="width:100%;resize:vertical;font-family:inherit;font-size:13px;line-height:1.4">${(e.desc||'').replace(/</g,'&lt;')}</textarea></div>
    <div style="background:rgba(61,138,198,.08);border:1px solid rgba(61,138,198,.25);border-radius:12px;padding:12px 14px;margin:6px 0 12px">
      <label style="display:block;font-weight:700;font-size:13px;margin-bottom:8px"><i class="ti ti-clock" style="color:var(--bleu-mer)"></i> Temps de main d'œuvre</label>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><input type="text" inputmode="decimal" value="${e.h}" oninput="editOuvr.h=_pf(this.value);_ouvrMajPrix()" style="width:104px;font-size:19px;font-weight:800;text-align:center"><span style="font-weight:600">heure(s) par <b>${e.unite}</b></span></div>
      <div class="tiny" style="color:var(--ink-3);margin-top:8px"><i class="ti ti-info-circle"></i> L'ouvrage se chiffre au <b>${e.unite}</b>. Dans le devis tu indiques la quantité réelle (ex. 2 ${e.unite} ou 50 ${e.unite}) — le total s'ajuste tout seul.</div>
    </div>
    <div class="tiny" style="font-weight:700;margin:6px 0 8px">PRODUITS (par ${e.unite} d'ouvrage)</div>
    <div>${e.four.map((f,i)=>{const p=catF(f.fid)||{nom:'?',pu:0,u:''};return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:8px 10px;border:1px solid var(--line);border-radius:10px">
      <span style="width:32px;height:32px;border-radius:8px;background:rgba(243,146,0,.14);color:var(--orange-dark);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0">${(p.nom||'?').trim().charAt(0).toUpperCase()}</span>
      <span style="flex:1;min-width:0"><span style="font-weight:600;font-size:13px;display:block">${p.nom}</span><span class="tiny" style="color:var(--ink-3)">${p.pu} €/${p.u}</span></span>
      <input class="cell" type="text" inputmode="decimal" style="width:74px" value="${f.qte}" onchange="ouvrSetFour(${i},'qte',this.value)" title="quantité par ${e.unite}">
      <button class="icon-x" onclick="ouvrDelFour(${i})"><i class="ti ti-x"></i></button>
    </div>`}).join('')||'<div class="tiny" style="color:var(--ink-3);margin-bottom:8px">Aucun produit — main d\'œuvre seule.</div>'}</div>
    <button class="btn sm primary" onclick="ouvrPickProduct()"><i class="ti ti-search"></i> Choisir un produit</button>
    <div style="display:flex;gap:10px;margin:16px 0;flex-wrap:wrap"><div style="flex:1;min-width:110px;background:rgba(181,101,29,.08);border:1px solid rgba(181,101,29,.2);border-radius:12px;padding:11px;text-align:center"><div class="tiny" style="color:#B5651D;font-weight:700">Déboursé / ${e.unite}</div><div id="ouvrDeb" style="font-size:19px;font-weight:800;color:#B5651D">${ouvrPrevCost()} €</div></div><div style="flex:1;min-width:110px;background:linear-gradient(135deg,rgba(243,146,0,.14),transparent);border-radius:12px;padding:11px;text-align:center"><div class="tiny" style="color:var(--orange-dark);font-weight:700">Vente / ${e.unite}</div><div class="rnd" id="ouvrPx" style="font-size:19px;font-weight:800;color:var(--orange-dark)">${ouvrPreview()} €</div></div><div style="flex:1;min-width:110px;background:rgba(122,139,79,.12);border-radius:12px;padding:11px;text-align:center"><div class="tiny" style="color:var(--olive);font-weight:700">Marge</div><div id="ouvrMarge" style="font-size:19px;font-weight:800;color:${(ouvrPreview()-ouvrPrevCost())>=0?'var(--olive)':'var(--alerte)'}">${(ouvrPreview()-ouvrPrevCost())>=0?'+':''}${ouvrPreview()-ouvrPrevCost()} € (${ouvrPreview()>0?Math.round((ouvrPreview()-ouvrPrevCost())/ouvrPreview()*100):0}%)</div></div></div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="creerOuvrage()"><i class="ti ti-check"></i> ${e.id?"Enregistrer les modifications":"Créer l'ouvrage"}</button>
  </div>`;
}
function creerOuvrage(){const e=editOuvr;if(!e.nom.trim()){toast("Indiquez le nom de l'ouvrage",'info','ti-alert-circle');return;}if(e.id){const o=ouvr(e.id);if(o)Object.assign(o,{cat:e.cat||'Divers',nom:e.nom,desc:e.desc||'',unite:e.unite,h:e.h,four:e.four.map(f=>({fid:f.fid,qte:f.qte})),photo:e.photo||''});}else{ouvrages.push({id:'o'+Date.now(),cat:e.cat||'Divers',nom:e.nom,desc:e.desc||'',icon:'ti-tools',unite:e.unite,h:e.h,four:e.four.map(f=>({fid:f.fid,qte:f.qte})),photo:e.photo||''});}document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast(e.id?'Ouvrage mis à jour':'Ouvrage « '+e.nom+' » créé','ok','ti-stack-2');}

views.plieur=()=>{

        <div style="flex:1"><label class="tiny" style="font-weight:700;display:block;margin-bottom:5px">Épaisseur (mm)</label><select class="cell" id="plEp" style="width:100%"><option>0.65</option><option>0.70</option><option>0.80</option><option>1.00</option></select></div>

      <div id="segs"></div>
      <button class="btn sm ghost" id="addSeg" style="margin-top:6px"><i class="ti ti-plus"></i> Ajouter un segment</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card card-pad" style="text-align:center"><div class="plieur-stage"><svg id="plSvg" width="100%" height="100%" viewBox="0 0 320 240"></svg></div></div>
      <div class="card card-pad" style="background:linear-gradient(135deg,rgba(243,146,0,.12),rgba(243,146,0,.04))">
        <div style="display:flex;justify-content:space-between;align-items:center"><div><div class="tiny" style="font-weight:700">DÉVELOPPÉ À PLAT</div><div class="rnd" id="plDev" style="font-size:40px;font-weight:800;color:var(--orange-dark);line-height:1">— mm</div></div>
        <div style="text-align:right"><div class="tiny">Déduction de pli totale</div><div class="rnd" id="plDed" style="font-size:20px;font-weight:700">— mm</div><div class="tiny" id="plInfo" style="margin-top:4px"></div></div></div>
      </div>
    </div>
  </div></div>`;
};

views.profils=()=>`<div class="view"><div class="page-head"><div><h1>Profils zinc / cuivre / alu</h1><p>Bibliothèque métier · à glisser dans une préparation chantier</p></div><button class="btn primary" onclick="toast('Profil ajouté (démo)')"><i class="ti ti-plus"></i> Ajouter</button></div>
  <div class="card"><table><thead><tr><th>Profil</th><th>Matériau</th><th>Développé</th><th>Poids</th><th>Prix moyen</th><th></th></tr></thead><tbody>
    ${profils.map(p=>`<tr class="rowlink"><td style="font-weight:600"><i class="ti ti-ruler-2" style="color:var(--orange);margin-right:8px"></i>${p.n}</td><td><span class="tag" style="background:${p.mat==='Cuivre'?'rgba(198,107,61,.16);color:var(--sienne)':'rgba(61,138,198,.14);color:var(--bleu-mer)'}">${p.mat}</span></td><td>${p.dev}</td><td>${p.poids}</td><td style="font-weight:700">${p.pu}</td><td><button class="btn sm ghost" onclick="toast('Ajouté à la préparation','ok','ti-plus')"><i class="ti ti-plus"></i></button></td></tr>`).join('')}
  </tbody></table></div></div>`;

views.stock=()=>{const bas=produitsBas();const num=(id,f,v,w)=>`<input class="cell noarrow" type="number" min="0" step="any" value="${v||0}" onchange="stockSet('${id}','${f}',this.value)" style="width:${w}px;text-align:center;font-weight:700;font-size:15px">`;
  const numM=(id,f,v)=>`<input class="cell noarrow" type="number" min="0" step="any" value="${v||0}" onchange="stockSet('${id}','${f}',this.value)" style="width:100%;text-align:center;font-weight:700;font-size:16px;box-sizing:border-box">`;
  return `<div class="view"><div class="page-head"><div><h1>Stock & inventaire</h1><p>${catFournitures.length} produits · <span style="color:var(--alerte);font-weight:600">${bas.length} sous le seuil</span> · saisie directe des quantités</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="openScanner()"><i class="ti ti-qrcode"></i> Scanner un QR</button><button class="btn" onclick="reappoList()"><i class="ti ti-shopping-cart"></i> Liste de réappro${bas.length?` <span class="tag" style="background:rgba(184,58,38,.13);color:var(--alerte);margin-left:4px">${bas.length}</span>`:''}</button><button class="btn" onclick="biblioTab='produits';go('biblio')"><i class="ti ti-package"></i> Gérer les produits</button></div></div>
  <div class="card only-desktop"><table><thead><tr><th>Produit</th><th style="text-align:center">Stock disponible</th><th style="text-align:center">Réservé chantier</th><th>Dispo. réel</th><th>Niveau</th><th style="text-align:center">Seuil d'alerte</th><th>Statut</th><th>QR</th></tr></thead><tbody>
    ${catFournitures.map(p=>{const d=stockDispo(p),low=stockBas(p),pc=Math.min(100,Math.round(d/(((p.seuil||1)*2))*100));return `<tr><td style="font-weight:600">${p.nom}<div class="tiny" style="color:var(--ink-3)">${p.cat||'Divers'} · ${p.u}</div></td>
      <td style="text-align:center">${num(p.id,'stock',p.stock,72)} <span class="tiny" style="color:var(--ink-3)">${p.u}</span></td>
      <td style="text-align:center">${num(p.id,'reserve',p.reserve,64)} <span class="tiny" style="color:var(--ink-3)">${p.u}</span><div class="tiny" style="color:var(--ink-3)">auto à la validation devis</div></td>
      <td style="font-weight:800;color:${low?'var(--alerte)':'var(--ink)'}">${d} ${p.u}</td>
      <td style="min-width:120px"><div class="bar"><span style="width:${pc}%;background:${low?'var(--alerte)':'var(--olive)'}"></span></div></td>
      <td style="text-align:center">${num(p.id,'seuil',p.seuil,56)}</td>
      <td>${low?'<span class="tag" style="background:rgba(184,58,38,.13);color:var(--alerte)"><i class="ti ti-alert-triangle" style="font-size:12px"></i> réappro</span>':'<span class="tag" style="background:rgba(122,139,79,.16);color:var(--olive)"><span class="tdot"></span>OK</span>'}</td>
      <td><button class="btn sm ghost" title="QR code de rayonnage" onclick="showProdQR('${p.id}')"><i class="ti ti-qrcode"></i></button></td></tr>`}).join('')}
  </tbody></table></div>
  <div class="only-mobile" style="flex-direction:column;gap:11px">${catFournitures.map(p=>{const d=stockDispo(p),low=stockBas(p),pc=Math.min(100,Math.round(d/(((p.seuil||1)*2))*100));return `<div class="card" style="padding:13px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">

/* ===== QR code produit + scanner stock ===== */
function _qrDataURL(text){try{const t=qrcode(0,'M');t.addData(text);t.make();return t.createDataURL(6,10);}catch(e){return '';}}
function showProdQR(id){const p=catF(id);if(!p)return;if(typeof qrcode==='undefined'){toast('Générateur QR en cours de chargement, réessaie','info','ti-loader');return;}
  const url=location.origin+'/?p='+id;const img=_qrDataURL(url);
  modal(`<div class="modal-head"><h3>QR rayonnage</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body" style="text-align:center">
    <div id="qrPrintArea" style="display:inline-block;padding:20px 22px 16px;border:2px solid #111;border-radius:8px">
      <div style="font-weight:800;font-size:17px;margin-bottom:10px">${p.nom}</div>
      ${img?`<img src="${img}" style="width:210px;height:210px;image-rendering:pixelated">`:'<div class="tiny">QR indisponible</div>'}
      <div style="font-size:11px;color:#555;margin-top:8px">${p.cat||''} · ${p.u} · Zinguerie Provençale</div>
    </div>
    <p class="tiny" style="color:var(--ink-3);margin:14px 0 4px">Colle ce QR sur l'étagère du produit. Le gestionnaire le scanne (bouton « Scanner un QR ») pour ajouter ou retirer du stock instantanément.</p>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:8px" onclick="_printQR()"><i class="ti ti-printer"></i> Imprimer l'étiquette</button>
  </div>`);
}
function _printQR(){const a=document.getElementById('qrPrintArea');if(!a)return;const w=window.open('','_blank');if(!w){toast('Autorise les fenêtres pop-up pour imprimer','info','ti-alert-circle');return;}w.document.write('<html><head><title>QR produit</title></head><body style="text-align:center;font-family:sans-serif;padding:36px">'+a.outerHTML+'</body></html>');w.document.close();w.focus();setTimeout(()=>{try{w.print();}catch(e){}},300);}
function stockScanPanel(id){const p=catF(id);if(!p){toast('Produit introuvable','info','ti-alert-circle');return;}
  modal(`<div class="modal-head"><h3><i class="ti ti-qrcode" style="color:var(--orange)"></i> ${p.nom}</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div class="tiny" style="color:var(--ink-3);margin-bottom:10px">${p.cat||'Divers'}</div>
    <div style="display:flex;gap:12px;text-align:center;margin-bottom:14px">
      <div style="flex:1;background:var(--surface-2);border-radius:12px;padding:12px"><div class="tiny" style="color:var(--ink-3)">Stock total</div><div id="scStock" style="font-weight:800;font-size:24px">${p.stock||0}</div><div class="tiny">${p.u}</div></div>
      <div style="flex:1;background:var(--surface-2);border-radius:12px;padding:12px"><div class="tiny" style="color:var(--ink-3)">Disponible</div><div id="scDispo" style="font-weight:800;font-size:24px;color:var(--olive)">${stockDispo(p)}</div><div class="tiny">${p.u}</div></div>
    </div>
    <label class="tiny" style="font-weight:700">Quantité</label>
    <input id="scQty" class="cell noarrow" type="number" min="0" step="any" value="1" style="width:100%;font-size:26px;text-align:center;font-weight:800;padding:12px;margin:6px 0 14px;box-sizing:border-box">
    <div style="display:flex;gap:10px">
      <button class="btn" style="flex:1;justify-content:center;background:rgba(122,139,79,.18);color:var(--olive);border-color:transparent;font-weight:800;min-height:48px" onclick="scanMove('${id}',1)"><i class="ti ti-plus"></i> Entrée stock</button>
      <button class="btn" style="flex:1;justify-content:center;background:rgba(184,58,38,.14);color:var(--alerte);border-color:transparent;font-weight:800;min-height:48px" onclick="scanMove('${id}',-1)"><i class="ti ti-minus"></i> Sortie stock</button>
    </div>
  </div>`);
  setTimeout(()=>{const q=document.getElementById('scQty');if(q){q.focus();q.select();}},60);
}
function scanMove(id,sign){const p=catF(id);if(!p)return;const q=Math.abs(parseFloat(String(_v('scQty')).replace(',','.'))||0);if(!q){toast('Indique une quantité','info','ti-alert-circle');return;}p.stock=Math.max(0,(p.stock||0)+sign*q);render();const s=document.getElementById('scStock'),d=document.getElementById('scDispo');if(s)s.textContent=p.stock;if(d)d.textContent=stockDispo(p);toast((sign>0?'+':'−')+q+' '+p.u+' · '+p.nom,'ok',sign>0?'ti-circle-plus':'ti-circle-minus');}
let _scanStream=null,_scanRAF=null;
function openScanner(){if(typeof jsQR==='undefined'){toast('Scanner en cours de chargement, réessaie','info','ti-loader');return;}
  modal(`<div class="modal-head"><h3><i class="ti ti-qrcode" style="color:var(--orange)"></i> Scanner un QR produit</h3><button class="icon-x" onclick="closeScanner()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body" style="text-align:center">
    <div style="position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:1/1;max-width:330px;margin:0 auto"><video id="scanVid" playsinline muted style="width:100%;height:100%;object-fit:cover"></video><div style="position:absolute;inset:14%;border:3px solid rgba(255,255,255,.9);border-radius:14px"></div></div>
    <div id="scanMsg" class="tiny" style="color:var(--ink-3);margin-top:12px">Vise le QR collé sur l'étagère…</div>
  </div>`);
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{_scanStream=stream;const v=document.getElementById('scanVid');if(!v){stream.getTracks().forEach(t=>t.stop());return;}v.srcObject=stream;v.setAttribute('playsinline','');v.play();const cv=document.createElement('canvas');const tick=()=>{if(!_scanStream)return;if(v.readyState===v.HAVE_ENOUGH_DATA&&v.videoWidth){cv.width=v.videoWidth;cv.height=v.videoHeight;const ctx=cv.getContext('2d');ctx.drawImage(v,0,0,cv.width,cv.height);try{const img=ctx.getImageData(0,0,cv.width,cv.height);const code=jsQR(img.data,img.width,img.height);if(code&&code.data){_onScan(code.data);return;}}catch(e){}}_scanRAF=requestAnimationFrame(tick);};_scanRAF=requestAnimationFrame(tick);}).catch(err=>{const m=document.getElementById('scanMsg');if(m){m.style.color='var(--alerte)';m.textContent="Caméra inaccessible. Autorise l'accès à la caméra, ou ajuste le stock à la main dans le tableau.";}});
}
function _onScan(data){let id=null;try{const u=new URL(data);id=u.searchParams.get('p');}catch(e){const m=String(data).match(/[?&]p=([\w-]+)/);if(m)id=m[1];else if(/^[\w-]+$/.test(String(data)))id=String(data);}closeScanner();if(id&&catF(id))stockScanPanel(id);else toast('QR non reconnu — ce n\'est pas un produit Zinguerie','info','ti-alert-circle');}
function closeScanner(){if(_scanRAF)cancelAnimationFrame(_scanRAF);_scanRAF=null;if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}document.querySelectorAll('.overlay').forEach(o=>o.remove());}
function _consumeQR(){try{const id=new URLSearchParams(location.search).get('p');if(id&&currentCompte()&&catF(id)){stockScanPanel(id);history.replaceState(null,'',location.pathname);}}catch(e){}}

function exportData(){try{const data=JSON.stringify(_stateObj());const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const d=new Date(),p=n=>String(n).padStart(2,'0');const a=document.createElement('a');a.href=url;a.download='zinguerie-sauvegarde-'+d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);toast('Sauvegarde téléchargée','ok','ti-download');}catch(e){toast("Erreur lors de l'export",'info','ti-alert-circle');}}
function importData(input){const f=input.files&&input.files[0];if(!f){return;}input.value='';const r=new FileReader();r.onload=ev=>{let d;try{d=JSON.parse(ev.target.result);}catch(e){toast('Fichier illisible','info','ti-alert-circle');return;}if(!d||!d.arr){toast('Fichier de sauvegarde invalide','info','ti-alert-circle');return;}if(!confirm('Restaurer cette sauvegarde ? Les données actuelles seront remplacées par celles du fichier, sur tous les appareils.'))return;try{_applyState(d);if(typeof renderNav==='function')renderNav();render();toast('Sauvegarde restaurée','ok','ti-check');}catch(e){toast('Erreur lors de la restauration','info','ti-alert-circle');}};r.readAsText(f);}

/* PLIEUR — calcul de développé réel */
let plSegs=[{cote:40,angle:90},{cote:120,angle:90},{cote:25,angle:null}];
function initPlieur(){
  const mat=document.getElementById('plMat'),ep=document.getElementById('plEp');
  function renderSegs(){const w=document.getElementById('segs');w.innerHTML=plSegs.map((s,i)=>`<div class="seg-row"><span class="badge-n">${i+1}</span><input class="cell" type="number" style="width:90px" value="${s.cote}" data-si="${i}" data-sf="cote" placeholder="cote mm">${i<plSegs.length-1?`<span class="tiny">pli</span><input class="cell" type="number" style="width:70px" value="${s.angle??90}" data-si="${i}" data-sf="angle" placeholder="°"><span class="tiny">°</span>`:'<span class="tiny" style="margin-left:8px">(dernier segment)</span>'}<button class="icon-x" data-sd="${i}" style="margin-left:auto"><i class="ti ti-trash"></i></button></div>`).join('');
    w.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',()=>{const i=+inp.dataset.si,f=inp.dataset.sf;plSegs[i][f]=+inp.value||0;compute();}));
    w.querySelectorAll('[data-sd]').forEach(b=>b.addEventListener('click',()=>{if(plSegs.length>1){plSegs.splice(+b.dataset.sd,1);if(plSegs.length)plSegs[plSegs.length-1].angle=null;renderSegs();compute();}}));}
  function compute(){
    const e=parseFloat(ep.value),m=mat.value;
    const k=m==='zinc'?0.45:m==='cuivre'?0.42:0.50;
    const ded90=4*e-Math.PI/2*e*(1+k);
    const totalCotes=plSegs.reduce((a,s)=>a+(s.cote||0),0);
    let totalDed=0;for(let i=0;i<plSegs.length-1;i++){const ang=plSegs[i].angle??90;totalDed+=Math.max(0,ded90*(Math.abs(ang)/90));}
    const dev=totalCotes-totalDed;
    document.getElementById('plDev').textContent=dev.toFixed(0)+' mm';
    document.getElementById('plDed').textContent='−'+totalDed.toFixed(1)+' mm';
    document.getElementById('plInfo').textContent=`${plSegs.length} segments · ${plSegs.length-1} plis · ${(dev/1000).toFixed(3)} m`;
    drawPiece();
  }
  function drawPiece(){
    const svg=document.getElementById('plSvg');const W=320,H=240;
    let x=40,y=180,ang=0;const pts=[[x,y]];const scale=0.9;
    plSegs.forEach((s,i)=>{const rad=ang*Math.PI/180;x+=Math.cos(rad)*s.cote*scale*0.55;y-=Math.sin(rad)*s.cote*scale*0.55;pts.push([x,y]);if(i<plSegs.length-1){ang+=(180-(plSegs[i].angle??90));}});
    const minX=Math.min(...pts.map(p=>p[0])),maxX=Math.max(...pts.map(p=>p[0])),minY=Math.min(...pts.map(p=>p[1])),maxY=Math.max(...pts.map(p=>p[1]));
    const ox=(W-(maxX-minX))/2-minX,oy=(H-(maxY-minY))/2-minY;
    const d=pts.map((p,i)=>`${i?'L':'M'}${(p[0]+ox).toFixed(1)},${(p[1]+oy).toFixed(1)}`).join(' ');
    let labels='';pts.forEach((p,i)=>{if(i<plSegs.length){const a=p,b=pts[i+1];const mx=(a[0]+b[0])/2+ox,my=(a[1]+b[1])/2+oy;labels+=`<circle cx="${(a[0]+ox).toFixed(1)}" cy="${(a[1]+oy).toFixed(1)}" r="4" fill="#F39200"/><text x="${mx.toFixed(1)}" y="${(my-6).toFixed(1)}" font-size="12" font-weight="700" fill="#6B6B6B" text-anchor="middle">${plSegs[i].cote}</text>`;}});
    labels+=`<circle cx="${(pts[pts.length-1][0]+ox).toFixed(1)}" cy="${(pts[pts.length-1][1]+oy).toFixed(1)}" r="4" fill="#F39200"/>`;
    svg.innerHTML=`<path d="${d}" fill="none" stroke="#F39200" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>${labels}`;
  }
  document.getElementById('addSeg').onclick=()=>{plSegs[plSegs.length-1].angle=90;plSegs.push({cote:30,angle:null});renderSegs();compute();};
  mat.onchange=compute;ep.onchange=compute;
  renderSegs();compute();
}

async function doLogin(){const email=(_v('loginEmail')||'').toLowerCase().trim(),pass=_v('loginPass')||'';if(!email){_loginErr('Saisis ton adresse email.');return;}if(!pass){_loginErr('Saisis ton mot de passe.');return;}

          const su=await sb.auth.signUp({email,password:pass});

        } else {_loginBusy(false);_loginErr(_authMsg(r.error));return;}

  removeLogin();renderNav();render();applyAvatar();_applyRoleUI();saveState();toast('Bienvenue '+((c.nom||'').split(' ')[0])+' 👋','ok','ti-login-2');_consumeQR();}

const ZP_STORE_KEY='zp_erp_state_v3';
const _persistArrays={salaries,equipes,clients,chantiers,stock,profils,bureau,taches,demandesList,congesList,carnet,rdvs,devisLignes,catFournitures,ouvrages,factures,comptes,prodCats,ouvrCats,devisDossiers};

function _stateObj(){if(typeof _syncCurDevis==='function')_syncCurDevis();const d={arr:{},obj:{},scal:{tauxMO,coutMO,devisClient,currentDevis,_devisSeq,rdvSeq,agendaWeek,planWeek,carnetChef,coefMargeDefaut,sessionEmail}};for(const k in _persistArrays)d.arr[k]=_persistArrays[k];for(const k in _persistObjects)d.obj[k]=_persistObjects[k];return d;}
function _applyState(d){if(!d)return;if(d.arr)for(const k in _persistArrays){const v=d.arr[k];if(Array.isArray(v)){const a=_persistArrays[k];a.length=0;v.forEach(x=>a.push(x));}}if(d.obj)for(const k in _persistObjects){const v=d.obj[k];if(v&&typeof v==='object'){const o=_persistObjects[k];Object.keys(o).forEach(kk=>delete o[kk]);Object.assign(o,v);}}if(d.scal){const s=d.scal;if(typeof s.tauxMO==='number')tauxMO=s.tauxMO;if(s.devisClient!=null)devisClient=s.devisClient;if(s.currentDevis!==undefined)currentDevis=s.currentDevis;if(typeof s._devisSeq==='number')_devisSeq=s._devisSeq;if(typeof s.rdvSeq==='number')rdvSeq=s.rdvSeq;if(typeof s.agendaWeek==='number')agendaWeek=s.agendaWeek;if(typeof s.planWeek==='number')planWeek=s.planWeek;if(typeof s.carnetChef==='string')carnetChef=s.carnetChef;if(typeof s.coefMargeDefaut==='number')coefMargeDefaut=s.coefMargeDefaut;if(typeof s.coutMO==='number')coutMO=s.coutMO;}planData=planWeekData(planWeek);}

function _cloudPush(immediate){if(!sb||!_cloudReady||!sessionEmail)return;clearTimeout(_pushT);const go=async()=>{try{const obj=_stateObj();obj._src=_clientId;obj._ts=Date.now();const ua=new Date().toISOString();await sb.from('workspace').upsert({id:'main',data:obj,updated_at:ua});_lastUpdatedAt=ua;_lastSync=Date.now();_syncFoot();}catch(e){}};if(immediate)return go();_pushT=setTimeout(go,1200);}

function _isTyping(){const a=document.activeElement;return !!(a&&/^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)&&a.type!=='checkbox'&&a.type!=='radio');}
async function _pullAndApply(){

}
_boot();
