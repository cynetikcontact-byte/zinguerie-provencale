<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zinguerie Provençale — Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* Palette Provence — extraite de Branding.swift */
  --orange:#F39200; --orange-light:#FFB347; --orange-dark:#C56F00;
  --terracotta:#C66B3D; --bleu-mer:#3D8AC6; --bleu-dark:#1B4F8A;
  --olive:#7A8B4F; --lavande:#9B8FB8; --alerte:#B83A26; --soleil:#E8B547;
  --pierre:#F5F0E6; --creme:#FFF8EE; --charcoal:#2A2A2A; --slate:#6B6B6B;
  /* couleurs chantier */
  --ocre:#D49B5C; --garrigue:#7A8B4F; --mistral:#3D8AC6; --cigale:#E8B547;
  --c-lavande:#9B8FB8; --sienne:#C66B3D; --pin:#3F6B5C; --mer:#1B4F8A;

  --bg:#F3EEE3; --surface:#ffffff; --surface-2:#FBF7EF; --surface-3:#F1EADB;
  --line:#EBE3D3; --line-2:#DfD4bE; --ink:#2A2A2A; --ink-2:#6B6B6B; --ink-3:#9c958a;
  --radius:18px; --radius-sm:12px;
  --shadow-s:0 1px 2px rgba(120,80,20,.05);
  --shadow:0 2px 8px rgba(120,80,20,.06),0 12px 30px rgba(120,80,20,.07);
  --shadow-l:0 16px 44px rgba(120,80,20,.16);
  --shadow-orange:0 8px 22px rgba(243,146,0,.32);
}
body.dark{
  --bg:#19150f; --surface:#221d15; --surface-2:#2a2218; --surface-3:#33291c;
  --line:#352b1d; --line-2:#473922; --ink:#f4ecdd; --ink-2:#b5aa95; --ink-3:#7d735f;
  --pierre:#2a2218; --creme:#221d15;
  --shadow:0 2px 8px rgba(0,0,0,.35),0 14px 32px rgba(0,0,0,.4);
  --shadow-l:0 18px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}
h1,h2,h3,h4,.rnd{font-family:'Baloo 2','Inter',system-ui,sans-serif}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:3px solid transparent;background-clip:padding-box}

.app{display:grid;grid-template-columns:252px 1fr;grid-template-rows:66px 1fr;height:100vh;grid-template-areas:"side top" "side main"}

/* ---------- Sidebar ---------- */
.sidebar{grid-area:side;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;z-index:20}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.brand-logo{width:100%;max-width:176px;height:auto;display:block;margin:2px auto;background:#fff;border-radius:12px;padding:9px 12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.brand .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#FFB347,#F39200 65%,#C56F00);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;flex-shrink:0;box-shadow:var(--shadow-orange)}
.wordmark{line-height:1}
.wordmark .z{font-family:'Baloo 2';font-weight:800;font-size:15px;letter-spacing:1.5px;color:var(--ink)}
.wordmark .bar{height:2px;width:88px;background:var(--orange);margin:3px 0}
.wordmark .p{font-family:'Baloo 2';font-weight:800;font-size:13px;letter-spacing:1.5px;color:var(--ink)}
.nav-sect{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);padding:15px 22px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--ink-2);font-size:13.5px;border:none;background:none;width:100%;text-align:left;position:relative;transition:.16s;font-weight:500;border-radius:0}
.nav-item i{font-size:19px;width:22px;text-align:center;transition:.16s}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{color:var(--orange-dark);background:linear-gradient(90deg,rgba(243,146,0,.13),transparent)}
.nav-item.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3.5px;background:var(--orange);border-radius:0 4px 4px 0}
.nav-item.active i{color:var(--orange)}
.nav-badge{margin-left:auto;font-size:10px;background:var(--alerte);color:#fff;border-radius:20px;padding:2px 7px;font-weight:700}
.side-foot{margin-top:auto;padding:14px 20px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3)}
.live{display:inline-flex;align-items:center;gap:6px;color:var(--olive)}
.live .pulse{width:8px;height:8px;border-radius:50%;background:var(--olive);box-shadow:0 0 0 0 rgba(122,139,79,.6);animation:pulse 2s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(122,139,79,0)}100%{box-shadow:0 0 0 0 rgba(122,139,79,0)}}

/* ---------- Topbar ---------- */
.topbar{grid-area:top;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 24px;z-index:15;position:relative}
.search{flex:1;max-width:420px;position:relative}
.search input{width:100%;height:40px;border:1px solid var(--line);border-radius:12px;padding:0 14px 0 40px;font-size:13.5px;background:var(--surface-2);color:var(--ink);transition:.18s}
.search input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 4px rgba(243,146,0,.13);background:var(--surface)}
.search>i{position:absolute;left:13px;top:10px;color:var(--ink-3);font-size:18px}
.search-res{position:absolute;top:48px;left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-l);overflow:hidden;z-index:40}
.search-res a{display:flex;align-items:center;gap:11px;padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--line);color:var(--ink)}
.search-res a:last-child{border:none}.search-res a:hover{background:var(--surface-2)}.search-res i{font-size:18px;color:var(--orange)}
.wx-chip{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#FFE7B8,#FDD78A);color:#8a5a00;border-radius:11px;padding:7px 12px;font-size:13px;font-weight:700}
body.dark .wx-chip{background:linear-gradient(135deg,#3a2e16,#463618);color:#f0c468}
.top-right{margin-left:auto;display:flex;align-items:center;gap:11px}
.role-switch{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:1px}
.role-switch button{border:none;background:none;padding:6px 11px;border-radius:9px;font-size:12px;color:var(--ink-2);font-weight:600;transition:.18s;display:flex;align-items:center;gap:5px}
.role-switch button i{font-size:14px}
.role-switch button.active{background:var(--surface);color:var(--orange-dark);box-shadow:var(--shadow-s)}
.icon-btn{position:relative;width:40px;height:40px;border:1px solid var(--line);background:var(--surface);border-radius:12px;color:var(--ink-2);font-size:19px;display:flex;align-items:center;justify-content:center;transition:.18s}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.dot{position:absolute;top:8px;right:9px;width:8px;height:8px;background:var(--alerte);border-radius:50%;border:2px solid var(--surface)}
.avatar{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:'Baloo 2'}

.dropdown{position:absolute;top:54px;right:0;width:340px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-l);overflow:hidden;z-index:40;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98)}}
.dropdown h4{padding:14px 16px;font-size:15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.notif{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:12.5px}
.notif:last-child{border:none}
.notif .ni{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* ---------- Main ---------- */
.main{grid-area:main;overflow-y:auto;padding:24px 28px 70px}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:14px}
.page-head h1{font-size:26px;font-weight:800;letter-spacing:-.01em}
.page-head p{color:var(--ink-2);font-size:13px;margin-top:2px}

.btn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:12px;padding:9px 15px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.16s}
.btn:hover{background:var(--surface-2);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#FFB347,#F39200);border-color:transparent;color:#fff;box-shadow:var(--shadow-orange)}
.btn.primary:hover{box-shadow:0 10px 26px rgba(243,146,0,.42)}
.btn i{font-size:17px}.btn.sm{padding:6px 11px;font-size:12px;border-radius:10px}
.btn.ghost{border-color:transparent;background:rgba(243,146,0,.12);color:var(--orange-dark)}

.grid{display:grid;gap:18px}
.cols-4{grid-template-columns:repeat(4,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-2{grid-template-columns:1fr 1fr}
@media(max-width:1200px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr 1fr}.cols-2{grid-template-columns:1fr}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-head h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:9px}
.card-head h3 i{color:var(--orange)}
.card-head .sub{font-size:12px;color:var(--ink-3)}

.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-l)}
.kpi .ic{position:absolute;right:16px;top:16px;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.kpi .lab{font-size:12.5px;color:var(--ink-2);font-weight:600}
.kpi .val{font-family:'Baloo 2';font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.01em}
.kpi .delta{font-size:12px;margin-top:3px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.up{color:var(--olive)}.down{color:var(--alerte)}
.spark{display:block;width:100%;height:34px;margin-top:12px;opacity:.95}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;font-family:'Baloo 2';letter-spacing:.3px}
.tag .tdot{width:6px;height:6px;border-radius:50%;background:currentColor}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);font-weight:700;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--surface-2)}
td{padding:13px 20px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
.rowlink{cursor:pointer;transition:.12s}tbody tr.rowlink:hover{background:var(--surface-2)}

.bar{height:9px;background:var(--surface-3);border-radius:6px;overflow:hidden}
.bar>span{display:block;height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

.breadcrumb{display:flex;align-items:center;gap:8px;color:var(--ink-2);font-size:13px;margin-bottom:16px}
.breadcrumb a{color:var(--orange-dark);text-decoration:none;cursor:pointer;font-weight:600}
.breadcrumb i{font-size:15px;color:var(--ink-3)}
.muted{color:var(--ink-2)}.tiny{font-size:11.5px;color:var(--ink-3)}
.divider{height:1px;background:var(--line);margin:16px 0}

.banner{display:flex;align-items:center;gap:11px;padding:12px 16px;border-radius:13px;font-size:12.5px;font-weight:500}
.banner i{font-size:18px;flex-shrink:0}

/* hero chantier — carte postale */
.hero{position:relative;border-radius:22px;overflow:hidden;box-shadow:var(--shadow-l);color:#fff;min-height:220px;display:flex;flex-direction:column;justify-content:space-between;padding:20px}
.hero .roof{position:absolute;inset:0;background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.07) 0 4px,transparent 4px 24px);pointer-events:none}
.hero .veil{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(0,0,0,.55))}
.hero>*{position:relative;z-index:2}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start}
.chip-w{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);padding:5px 11px;border-radius:20px;font-size:13px;font-weight:700;backdrop-filter:blur(4px)}
.hero h2{font-size:28px;font-weight:800;line-height:1.05}
.hero .eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;opacity:.9;font-family:'Baloo 2'}

/* chantier postcard grid */
.ch-card{position:relative;border-radius:20px;overflow:hidden;min-height:158px;color:#fff;cursor:pointer;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;transition:.2s}
.ch-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-l)}
.ch-card .roof{position:absolute;inset:0;background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.06) 0 4px,transparent 4px 24px)}
.ch-card .veil{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.5))}
.ch-card>*{position:relative;z-index:2}
.ch-badges{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:3}
.ch-badge{font-family:'Baloo 2';font-size:10px;font-weight:800;letter-spacing:.5px;padding:4px 9px;border-radius:20px;background:rgba(255,255,255,.95)}

.avatar-sm{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Baloo 2'}
.people{display:flex}.people .avatar-sm{margin-left:-8px;border:2px solid var(--surface)}.people .avatar-sm:first-child{margin-left:0}
.kv{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv:last-child{border:none}.kv .k{color:var(--ink-2)}.kv .v{font-weight:600;text-align:right}
.note-item{padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}.note-item:last-child{border:none}

/* progress ring */
.ring{position:relative;width:120px;height:120px}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

/* tactile buttons (terrain) */
.tactile{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tbtn{border:none;border-radius:16px;padding:18px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:'Baloo 2';font-weight:700;font-size:13px;transition:.15s}
.tbtn i{font-size:26px}.tbtn:active{transform:scale(.96)}

/* weather row */
.wx{display:flex;gap:10px}
.wx-day{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:12px 8px}
.wx-day i{font-size:26px}.wx-day b{display:block;font-size:13px;margin-top:5px;font-family:'Baloo 2'}.wx-day small{font-size:11px;color:var(--ink-3)}

/* kanban / steps */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:var(--surface-2)}
.step .sn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Baloo 2';flex-shrink:0}

input.cell,select.cell{border:1px solid var(--line-2);border-radius:9px;height:34px;padding:0 9px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--ink)}
input.cell:focus,select.cell:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(243,146,0,.13)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:6px;background:var(--surface-3);width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:4px solid var(--orange);box-shadow:var(--shadow-s);cursor:pointer}

.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.fgrid{grid-template-columns:repeat(2,1fr)}}
.ftile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:.2s}
.ftile:hover{transform:translateY(-4px);box-shadow:var(--shadow-l);border-color:var(--orange)}
.ftile .fi{width:54px;height:54px;border-radius:15px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:26px}
.ftile b{display:block;font-size:14px;margin-top:11px;font-family:'Baloo 2'}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1100px){.detail-grid{grid-template-columns:1fr}}

.overlay{position:fixed;inset:0;background:rgba(40,30,10,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fade .2s}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-l);width:540px;max-width:92vw;max-height:88vh;overflow-y:auto;animation:pop .22s}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:19px}
.modal-body{padding:22px 24px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input,.field select{width:100%;height:40px;border:1px solid var(--line-2);border-radius:11px;padding:0 12px;font-size:13.5px;background:var(--surface);color:var(--ink);font-family:inherit}
.icon-x{border:none;background:none;color:var(--ink-3);font-size:18px;cursor:pointer}.icon-x:hover{color:var(--alerte)}

#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200}
.toast{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--orange);border-radius:13px;box-shadow:var(--shadow-l);padding:13px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;min-width:260px;animation:slidein .3s cubic-bezier(.2,.9,.2,1)}
.toast.ok{border-left-color:var(--olive)}.toast.ok i{color:var(--olive)}.toast i{color:var(--orange)}
@keyframes slidein{from{opacity:0;transform:translateX(40px)}}

.timer-big{font-family:'Baloo 2';font-size:46px;font-weight:800;font-variant-numeric:tabular-nums}
.tot-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px}
.tot-row.big{font-size:18px;font-weight:800;font-family:'Baloo 2';border-top:1px solid var(--line);margin-top:7px;padding-top:13px}

/* plieur canvas */
.plieur-stage{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;height:260px;display:flex;align-items:center;justify-content:center;position:relative}
.seg-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.seg-row .badge-n{width:26px;height:26px;border-radius:8px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Baloo 2';font-size:12px;flex-shrink:0}

/* ===== Accessibilité & confort ===== */
:focus-visible{outline:2.5px solid var(--orange);outline-offset:2px;border-radius:6px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.card:has(table){overflow-x:auto}
.card:has(table) table{min-width:560px}
.hero h2,.ch-card .nm,.ch-card>div>div{text-shadow:0 1px 3px rgba(0,0,0,.28)}
/* menus déroulants génériques */
.menu{position:absolute;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-l);overflow:hidden;z-index:60;min-width:210px;animation:pop .16s ease}
.menu button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:none;padding:11px 15px;font-size:13.5px;color:var(--ink);font-weight:500;font-family:inherit}
.menu button:hover{background:var(--surface-2)}
.menu button i{font-size:18px;color:var(--ink-2);width:20px;text-align:center}
.menu .sep{height:1px;background:var(--line);margin:4px 0}
.kbd{font-size:10px;font-weight:700;background:var(--surface-3);color:var(--ink-2);border-radius:5px;padding:2px 6px;margin-left:auto;font-family:inherit}
#burger{display:none}
#navScrim{display:none;position:fixed;inset:0;background:rgba(30,20,5,.4);z-index:18}
#navScrim.show{display:block}

/* ===== Responsive ===== */
@media(max-width:1000px){
  .app{grid-template-columns:1fr;grid-template-areas:"top" "main"}
  .sidebar{position:fixed;left:-264px;top:0;bottom:0;width:252px;z-index:30;transition:left .25s cubic-bezier(.2,.8,.2,1);box-shadow:var(--shadow-l)}
  .sidebar.open{left:0}
  #burger{display:flex}
  .role-switch button span,.role-switch button{font-size:0}
  .role-switch button i{font-size:16px}
  .wx-chip{display:none}
  .main{padding:18px 16px 60px}
  .nav-item{padding:13px 20px}
  .detail-grid{grid-template-columns:1fr}
}
@media(max-width:680px){
  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}
  .role-switch{display:none}
  .page-head h1{font-size:21px}
  .icon-btn{width:44px;height:44px}
  .topbar{padding:0 14px;gap:10px}
}
/* ===== Responsive mobile renforcé ===== */
@media(max-width:880px){
  /* empiler tous les layouts 2 colonnes (devis, chat, fiches…) */
  .main [style*="1.35fr 1fr"],.main [style*="1.5fr 1fr"],.main [style*="1fr 1.1fr"],.main [style*="1fr 1fr"],.main [style*="280px 1fr"],.main [style*="252px 1fr"],.main [style*="repeat(3,1fr)"],.main [style*="repeat(4,1fr)"],.main [style*="repeat(2,1fr)"]{grid-template-columns:1fr!important}
  .main [style*="position:sticky"]{position:static!important;top:auto!important}
  .page-head{flex-wrap:wrap;gap:10px;align-items:flex-start}
  .page-head>div:last-child{width:100%;flex-wrap:wrap}
  .modal-head{padding:15px 16px}
  .modal-body{padding:16px 16px}
  /* calendriers / plannings : scroll horizontal au lieu de déborder */
  .card:has([style*="px repeat("]){overflow-x:auto;-webkit-overflow-scrolling:touch}
  .main [style*="px repeat("]{min-width:540px}
}
@media(max-width:560px){
  .main{padding:14px 12px 74px}
  .search{display:none}
  .topbar{justify-content:space-between}
  .top-right{gap:6px}
  #createBtn{padding:0 12px;font-size:0;gap:0}
  #createBtn i{font-size:19px}
  .search input{font-size:13px}
  .page-head h1{font-size:18px}
  h1{font-size:20px}
  .card-pad{padding:14px}
}
/* ===== Mobile : aucun défilement horizontal, aucune colonne à faire défiler ===== */
html{-webkit-text-size-adjust:100%}
@media(max-width:880px){
  html,body{overflow-x:hidden!important;max-width:100%}
  .app{grid-template-columns:minmax(0,1fr)!important;min-width:0;max-width:100vw}
  .main,.view,.card{max-width:100%;min-width:0;overflow-x:hidden}
  .card table,.card tbody,.card tr,.card td,.card:has(table) table{min-width:0!important;max-width:100%}
  /* tableaux -> cartes empilées : plus de colonnes à faire défiler latéralement */
  .card table{display:block;width:100%}
  .card table thead{position:absolute!important;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;padding:0;margin:-1px}
  .card table tbody{display:block}
  .card table tr{display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center;padding:11px 13px;border-bottom:1px solid var(--line)}
  .card table tr:last-child{border-bottom:0}
  .card table td{display:inline-flex;align-items:center;border:0!important;padding:0!important;font-size:12.5px;white-space:normal;height:auto}
  .card table td:first-child{flex:1 0 100%;font-weight:700;font-size:13.5px;margin-bottom:1px}
  .card table td .btn,.card table td .tag{margin:0}
  /* le mini-aperçu du devis reste un vrai document (pas empilé) */
  #devisPreview table{display:table;width:100%}
  #devisPreview thead{position:static!important;width:auto;height:auto;clip:auto;display:table-header-group}
  #devisPreview tbody{display:table-row-group}
  #devisPreview tr{display:table-row;padding:0;border:0}
  #devisPreview td,#devisPreview th{display:table-cell;border:revert!important;padding:revert!important}
}
/* Bascule affichage desktop / mobile dédié (ex: stock) */
.only-mobile{display:none}
#searchBtn{display:none}
.dstat-chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
.dstat-chip:hover{border-color:var(--orange)}
.dstat-chip.on{background:var(--orange);border-color:var(--orange);color:#fff}
.msearchres a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--ink);text-decoration:none;cursor:pointer;font-size:13.5px}
.msearchres a:hover{background:var(--surface-2)}
.msearchres a i{color:var(--orange);font-size:17px}
.msearchres a .muted{color:var(--ink-3)}
@media(max-width:560px){#searchBtn{display:flex}}
@media(max-width:880px){.only-desktop{display:none!important}.only-mobile{display:flex!important}}
/* ===== Barre d'onglets mobile (bottom nav) — désactivée, on garde le menu à gauche ===== */
.bottomnav{display:none!important}
@media(max-width:880px){
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -5px 18px rgba(40,30,10,.08);padding:7px 4px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));justify-content:space-around;backdrop-filter:saturate(1.1)}
  .bn-item{flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;padding:3px 2px;color:var(--ink-3);font-family:inherit;cursor:pointer;min-width:0;transition:color .15s}
  .bn-item .bn-ic{position:relative;font-size:23px;line-height:1;transition:transform .15s}
  .bn-item .bn-lab{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;letter-spacing:.01em}
  .bn-item.on{color:var(--orange-dark)}
  .bn-item.on .bn-ic{transform:translateY(-2px)}
  .bn-item.on .bn-ic::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--orange)}
  .bn-badge{position:absolute;top:-6px;right:-10px;background:var(--alerte);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;box-shadow:0 0 0 2px var(--surface)}
  .main{padding-bottom:26px!important}
}
/* Composition des lignes de devis : nom sur sa propre ligne sur mobile */
@media(max-width:620px){
  .compo-head{display:none!important}
  .compo-row{flex-wrap:wrap!important;row-gap:2px!important}
  .compo-name{flex:1 0 100%!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;margin-bottom:1px}
  .compo-calc{flex-wrap:wrap!important}
  .compo-calc>span{flex:1 0 100%;text-align:left}
}
@media(pointer:coarse){
  .btn{min-height:44px}.nav-item{min-height:48px}
  .pl-chip .px{width:24px;height:24px;display:flex!important}
}
input.noarrow::-webkit-outer-spin-button,input.noarrow::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.noarrow{-moz-appearance:textfield;appearance:textfield}
</style>

function congeDays(from,to){const s=new Date(from),e=new Date(to);if(isNaN(s)||isNaN(e)||e<s)return 0;let n=0;for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){const wd=(d.getDay()+6)%7;if(wd<5)n++;}return n;}
function dateFr(x){const d=new Date(x);return isNaN(d)?'—':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function congeToPlanning(sal,from,to,clear){const base=new Date(2026,5,22);const s=new Date(from),e=new Date(to);for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){const diff=Math.round((d-base)/86400000);if(diff<0)continue;const wk=26+Math.floor(diff/7),day=((diff%7)+7)%7;if(day<=5){const wd=planWeekData(wk);if(wd[sal]){if(clear){if(wd[sal][day]==='conge')wd[sal][day]=null;}else wd[sal][day]='conge';}}}}

function renderNav(){
  const n=document.getElementById('nav');n.innerHTML='';

    if(it.sect){if(!NAV.some(x=>x.id&&x.roles.includes(role)))return;const d=document.createElement('div');d.className='nav-sect';d.textContent=it.sect;n.appendChild(d);return;}
    if(!it.roles.includes(role))return;
    const b=document.createElement('button');b.className='nav-item'+(activeId===it.id?' active':'');
    const bd=navBadge(it.id);
    b.innerHTML=`<i class="ti ${it.ic}"></i>${it.lab}`+(bd?`<span class="nav-badge">${bd}</span>`:'');

  });

}

}

          ${catList().map(c=>`<div style="display:flex;align-items:center;border-bottom:1px solid var(--line);${c===e.cat?'background:rgba(243,146,0,.1)':''}"><button type="button" data-c="${esc(c)}" onclick="_catPick(this.dataset.c)" style="flex:1;text-align:left;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:${c===e.cat?'700':'500'};cursor:pointer;color:var(--ink);padding:10px 12px">${c===e.cat?'<i class="ti ti-check" style="color:var(--orange)"></i> ':''}${c}</button><button type="button" data-c="${esc(c)}" onclick="delCategorie(this.dataset.c)" style="border:none;background:none;color:var(--ink-3);cursor:pointer;padding:8px 12px" title="Supprimer cette catégorie"><i class="ti ti-trash" style="font-size:14px"></i></button></div>`).join('')}

      </div>

    <div style="display:flex;gap:8px;align-items:flex-end">
      <div class="field" style="flex:1"><label>Prix d'achat (€)</label><input id="pdAchat" type="text" inputmode="decimal" value="${e.achat||''}" oninput="editProd.achat=_pf(this.value);_prodSyncPV()"></div>
      <div style="font-size:18px;color:var(--ink-3);padding-bottom:11px">×</div>

      <div style="font-size:18px;color:var(--ink-3);padding-bottom:11px">=</div>
      <div class="field" style="flex:1"><label>Prix de vente (€)</label><input id="pdPu" type="text" inputmode="decimal" value="${e.pu||''}" oninput="editProd.pu=_pf(this.value);_prodSyncCoef()"></div>

      <div class="tiny" style="font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px"><span><i class="ti ti-package" style="color:var(--orange)"></i> Stock</span><span class="tiny" style="font-weight:600;color:var(--ink-3)"><i class="ti ti-lock" style="font-size:11px"></i> se gère dans l'onglet Stock</span></div>

        <div><div class="tiny" style="color:var(--ink-3)">Réservé chantier</div><div style="font-weight:800;font-size:16px">${e.reserve||0} ${e.u||''}</div></div>
        <div><div class="tiny" style="color:var(--ink-3)">Dispo. réel</div><div style="font-weight:800;font-size:16px;color:${(((e.stock||0)-(e.reserve||0))<=(e.seuil||0)&&(e.seuil||0)>0)?'var(--alerte)':'var(--olive)'}">${(e.stock||0)-(e.reserve||0)} ${e.u||''}</div></div>
        <div><div class="tiny" style="color:var(--ink-3)">Seuil d'alerte</div><div style="font-weight:800;font-size:16px">${e.seuil||0} ${e.u||''}</div></div>
      </div>
      ${e.id?'':'<div class="tiny" style="color:var(--ink-3);margin-top:8px">Le stock initial et le seuil se saisissent dans l\'onglet <b>Stock &amp; inventaire</b> après création.</div>'}
    </div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="saveProduit()"><i class="ti ti-check"></i> ${e.id?'Enregistrer':'Créer le produit'}</button>
  </div>`;
}
function _prodSyncPV(){const e=editProd;e.pu=Math.round((e.achat||0)*(e.coef||0)*100)/100;const el=document.getElementById('pdPu');if(el)el.value=e.pu;_prodMargeShow();}
function _prodSyncCoef(){const e=editProd;e.coef=e.achat>0?Math.round(e.pu/e.achat*100)/100:0;const el=document.getElementById('pdCoef');if(el)el.value=e.coef;_prodMargeShow();}
function _prodMargeShow(){const el=document.getElementById('pdMarge');if(el)el.textContent=margePct(editProd)+'% de marge';}
function _prodDispoShow(){const e=editProd,d=(e.stock||0)-(e.reserve||0),low=(e.seuil||0)>0&&d<=e.seuil,el=document.getElementById('pdDispo');if(el)el.innerHTML='Disponible : <span style="color:'+(low?'var(--alerte)':'var(--olive)')+'">'+d+' '+(e.u||'')+'</span>'+(low?' — sous le seuil ⚠':'');}
function _prodPhotoPick(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const max=300;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));const cw=Math.round(w*sc),ch=Math.round(h*sc);const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;cv.getContext('2d').drawImage(img,0,0,cw,ch);editProd.photo=cv.toDataURL('image/jpeg',0.82);const p=document.getElementById('prodPhotoPrev');if(p){p.style.background='url('+editProd.photo+')';p.style.backgroundSize='cover';p.style.backgroundPosition='center';p.innerHTML='';}};img.src=ev.target.result;};r.readAsDataURL(f);}
function saveProduit(){const e=editProd;if(!e.nom.trim()){toast('Indiquez le nom du produit','info','ti-alert-circle');return;}if(e.id){const p=catF(e.id);if(p)Object.assign(p,{nom:e.nom,u:e.u,cat:e.cat,achat:e.achat,coef:e.coef,pu:e.pu,photo:e.photo});}else{catFournitures.push({id:'f-'+Date.now(),nom:e.nom,u:e.u,cat:e.cat,achat:e.achat,coef:e.coef,pu:e.pu,photo:e.photo});}document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast(e.id?'Produit mis à jour':'Produit créé','ok','ti-package');}
function delProduit(id){const p=catF(id);if(!p)return;if(confirm("Supprimer le produit « "+p.nom+" » ?")){catFournitures=catFournitures.filter(x=>x.id!==id);render();toast('Produit supprimé','info','ti-trash');}}

    ${[['KM','24/06','Pose des liteaux terminée côté sud. Zinc livré, conforme.'],['LB','23/06','Dépose complète, charpente saine. RAS.']].map(j=>`<div class="note-item" style="display:flex;gap:10px"><span class="avatar-sm" style="background:${(salaries.find(s=>s.init===j[0])||{}).col||'#999'}">${j[0]}</span><div><div style="font-weight:600">${j[2]}</div><span class="tiny">${j[1]}</span></div></div>`).join('')}
  </div></div></div>`;
};

/* planning stocké par semaine */
let planStore={26:{km:['ch1','ch1','ch2','ch2','ch2',null],lb:['ch1','ch1','ch4','ch4','conge',null],as:['ch3','ch3','ch2','ch2','ch2','ch2'],jp:['ch1','ch3','ch3','form','form',null]}};
function planWeekData(w){if(!planStore[w])planStore[w]={};salaries.forEach(s=>{if(!planStore[w][s.id])planStore[w][s.id]=[null,null,null,null,null,null];});return planStore[w];}
let planData=planWeekData(26);
function gotoWeek(w){planWeek=w;planMode='semaine';planData=planWeekData(w);render();}
function dlabel(d){const dt=new Date(2026,5,22);dt.setDate(22+(planWeek-26)*7+d);return ['Lun','Mar','Mer','Jeu','Ven','Sam'][d]+' '+dt.getDate();}
let planWeek=26, planFilter='', planMode='semaine', planDay=3, planBrush=null;
function setBrush(v){planBrush=planBrush===v?null:v;render();}
function paintCell(sid,day){if(planBrush){planData[sid][day]=planBrush==='erase'?null:(planData[sid][day]===planBrush?null:planBrush);render();}else assignCell(sid,day);}
const HJ=7; /* heures par jour travaillé */
const isCh=k=>!!chn(k);
const badDay=i=>weather[i][1].includes('rain')||weather[i][1].includes('wind');
const planLab=k=>k==='conge'?'Congé':k==='form'?'Formation':chn(k)?chn(k).nom:k;
const planCol=k=>chn(k)?chn(k).col:'#9c958a';
function setMode(m){planMode=m;render();}
function planNav(dir){if(planMode==='jour'){planDay=Math.max(0,Math.min(5,planDay+dir));}else{planWeek+=dir;planData=planWeekData(planWeek);}render();toast(planMode==='jour'?JOURS[planDay]:planMode==='mois'?'Mois suivant':'Semaine '+planWeek);}

/* grille jour / semaine / perso pour une liste de jours */
function planGridHTML(days){
  const cols=days.length;
  const weekLoad=s=>planData[s.id].filter(isCh).length*HJ;
  const persH=s=>days.filter(d=>isCh(planData[s.id][d])).length*HJ;
  const dayTot=d=>salaries.filter(s=>isCh(planData[s.id][d])).length*HJ;
  const total=salaries.reduce((a,s)=>a+persH(s),0);
  return `<div class="pl-grid" id="planGrid" style="grid-template-columns:172px repeat(${cols},1fr) 76px;min-width:${172+cols*132+76}px">
    <div class="pl-h" style="text-align:left;padding-left:14px">Équipe</div>
    ${days.map(d=>`<div class="pl-h ${planWeek===26&&d===TODAY_IDX?'today':''} ${badDay(d)?'bad':''}"><div class="dt">${dlabel(d)}</div><i class="ti ${weather[d][1]}" style="color:${badDay(d)?'var(--alerte)':'var(--ink-3)'};font-size:16px"></i> <span style="font-weight:600">${weather[d][2]}</span>${badDay(d)?'<div style="font-size:9px;color:var(--alerte);font-weight:700"><i class="ti ti-alert-triangle" style="font-size:10px"></i> '+weather[d][3]+'</div>':''}</div>`).join('')}
    <div class="pl-h">Total</div>
    ${salaries.map(s=>{const wl=weekLoad(s),pc=Math.round(wl/(5*HJ)*100);
      return `<div class="pl-name"><span class="avatar-sm" style="background:${s.col}">${s.init}</span><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12.5px">${s.nom.split(' ')[0]} ${s.nom.split(' ')[1][0]}.</div><div style="height:4px;background:var(--surface-3);border-radius:4px;margin-top:4px;overflow:hidden"><div style="width:${Math.min(100,pc)}%;height:100%;background:${pc>100?'var(--alerte)':s.col}"></div></div></div></div>
      ${days.map(d=>{const k=planData[s.id][d],dim=planFilter&&k!==planFilter;
        return `<div class="pl-cell ${planWeek===26&&d===TODAY_IDX?'today':''} ${planBrush?'painting':''}" data-sal="${s.id}" data-day="${d}" onclick="paintCell('${s.id}',${d})">
          ${k?`<div class="pl-chip ${isCh(k)?'':'off'} ${dim?'pl-dim':''}" draggable="true" data-cell="${k}" style="${isCh(k)?'background:'+planCol(k):''}">
              <span class="nm">${planLab(k)}</span>${isCh(k)?`<span class="hb"><i class="ti ti-clock" style="font-size:10px"></i>${HJ}h</span>`:''}
              ${isCh(k)&&badDay(d)?'<span class="rx" title="météo défavorable">⚠️</span>':''}
              <button class="px" onclick="event.stopPropagation();removeCell('${s.id}',${d})" title="Retirer">✕</button>
            </div>`:`<div class="add"><i class="ti ti-plus"></i></div>`}
        </div>`;}).join('')}
      <div class="pl-tot">${persH(s)} h</div>`;}).join('')}
    <div class="pl-foot" style="text-align:left;padding-left:14px;font-size:11px;color:var(--ink-2)">Total / jour</div>
    ${days.map(d=>`<div class="pl-foot" style="color:${dayTot(d)===0?'var(--ink-3)':'var(--ink)'}">${dayTot(d)} h</div>`).join('')}
    <div class="pl-foot" style="color:var(--orange-dark)">${total} h</div>
  </div>`;
}

/* vue mois : 4 semaines en heures par salarié */
function planMonthGrid(){
  const weeks=['S26','S27','S28','S29'],plages=['23–28 juin','30 juin–5','7–12 juil.','14–19 juil.'];
  const base=s=>planData[s.id].filter(isCh).length*HJ;
  const val=(s,wi)=>{if(wi===0)return base(s);const v=base(s)+[0,2,-6,4][wi]+(s.id.charCodeAt(1)%5)-2;return Math.max(0,Math.min(42,v));};
  const wk=wi=>salaries.reduce((a,s)=>a+val(s,wi),0);
  const intens=v=>v===0?'var(--surface-3)':v>40?'var(--alerte)':v>=28?'var(--olive)':'var(--soleil)';
  return `<div class="pl-grid" id="planGrid" style="grid-template-columns:172px repeat(4,1fr) 80px;min-width:740px">
    <div class="pl-h" style="text-align:left;padding-left:14px">Équipe</div>
    ${weeks.map((w,i)=>`<div class="pl-h ${i===0?'today':''}"><div class="dt">${w}</div><span class="tiny">${plages[i]}</span></div>`).join('')}
    <div class="pl-h">Mois</div>
    ${salaries.map(s=>{const tot=weeks.reduce((a,_,wi)=>a+val(s,wi),0);
      return `<div class="pl-name"><span class="avatar-sm" style="background:${s.col}">${s.init}</span><div style="font-weight:600;font-size:12.5px">${s.nom.split(' ')[0]}</div></div>
      ${weeks.map((w,wi)=>{const v=val(s,wi);return `<div class="pl-cell" style="display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="gotoWeek(${26+wi})"><div style="width:100%;text-align:center"><div style="font-family:'Baloo 2';font-weight:800;font-size:15px;color:${v>40?'var(--alerte)':'var(--ink)'}">${v} h</div><div style="height:5px;background:var(--surface-3);border-radius:4px;margin:5px 6px 0;overflow:hidden"><div style="width:${Math.min(100,v/40*100)}%;height:100%;background:${intens(v)}"></div></div></div></div>`;}).join('')}
      <div class="pl-tot">${tot} h</div>`;}).join('')}
    <div class="pl-foot" style="text-align:left;padding-left:14px;font-size:11px;color:var(--ink-2)">Total / sem.</div>
    ${weeks.map((w,wi)=>`<div class="pl-foot">${wk(wi)} h</div>`).join('')}
    <div class="pl-foot" style="color:var(--orange-dark)">${weeks.reduce((a,_,wi)=>a+wk(wi),0)} h</div>
  </div>`;
}

/* bandeau de suivi quand un chantier est sélectionné */
function planChantierSummary(){
  if(!planFilter)return '';
  const c=chn(planFilter);if(!c)return '';
  const planif=salaries.reduce((a,s)=>a+planData[s.id].filter(k=>k===c.id).length,0)*HJ;
  const pctReal=c.hEst?Math.round(c.hFaites/c.hEst*100):0;
  const aPlanifier=Math.max(0,c.hEst-c.hFaites-planif);
  const diff=pctReal-c.av;
  let v,vc,vb,vi;
  if(c.statut==='fini'){v='Chantier terminé';vc='var(--olive)';vb='rgba(122,139,79,.16)';vi='ti-circle-check';}
  else if(diff>8){v='En retard — heures brûlées plus vite que l\'avancement';vc='var(--alerte)';vb='rgba(184,58,38,.13)';vi='ti-trending-down';}
  else if(diff<-8){v='En avance — marge d\'heures confortable';vc='var(--olive)';vb='rgba(122,139,79,.16)';vi='ti-trending-up';}
  else{v='Dans les temps';vc='var(--bleu-mer)';vb='rgba(61,138,198,.14)';vi='ti-circle-check';}
  const realW=Math.min(100,c.hFaites/c.hEst*100),planW=Math.min(100-realW,planif/c.hEst*100);
  return `<div class="card" style="margin-bottom:16px;border-left:4px solid ${c.col}"><div class="card-pad">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span style="width:12px;height:12px;border-radius:50%;background:${c.col}"></span><h3 style="font-size:17px">${c.nom}</h3><span class="muted" style="font-size:12px">${cli(c.clientId).nom} · avancement ${c.av}%</span><span class="tag" style="margin-left:auto;background:${vb};color:${vc}"><i class="ti ${vi}" style="font-size:12px"></i> ${v}</span></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      ${[['Budget heures',c.hEst+' h','var(--ink)'],['Réalisées (pointées)',c.hFaites+' h · '+pctReal+'%','var(--terracotta)'],['Planifiées (cette vue)',planif+' h','var(--bleu-mer)'],['Reste à planifier',aPlanifier+' h',aPlanifier?'var(--orange-dark)':'var(--olive)']].map(x=>`<div style="background:var(--surface-2);border-radius:12px;padding:12px"><div class="tiny">${x[0]}</div><div class="rnd" style="font-size:21px;font-weight:800;color:${x[2]}">${x[1]}</div></div>`).join('')}
    </div>
    <div style="height:16px;background:var(--surface-3);border-radius:8px;overflow:hidden;display:flex">
      <div style="width:${realW}%;background:${c.col}"></div>
      <div style="width:${planW}%;background:${c.col};opacity:.45;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.6) 0 5px,transparent 5px 10px)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:8px" class="tiny"><span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c.col};vertical-align:middle"></span> Réalisées ${c.hFaites} h</span><span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c.col};opacity:.45;vertical-align:middle"></span> Planifiées ${planif} h</span><span>Budget ${c.hEst} h</span></div>
  </div></div>`;
}

views.planning=()=>{
  const lab=k=>k==='conge'?'Congé':k==='form'?'Formation':chn(k)?chn(k).nom:k;

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">

function assignCell(sid,day){
  const opts=chantiers.filter(c=>c.statut!=='fini').map(c=>`<button class="btn" style="width:100%;justify-content:flex-start;margin-bottom:8px" onclick="setCell('${sid}',${day},'${c.id}')"><span style="width:11px;height:11px;border-radius:50%;background:${c.col};margin-right:8px"></span>${c.nom}</button>`).join('');
  modal(`<div class="modal-head"><h3>Affecter — ${sal(sid).nom.split(' ')[0]}, ${JOURS[day]}</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div><div class="modal-body">${opts}<div class="divider"></div><div style="display:flex;gap:8px"><button class="btn" style="flex:1;justify-content:center" onclick="setCell('${sid}',${day},'conge')"><i class="ti ti-beach"></i> Congé</button><button class="btn" style="flex:1;justify-content:center" onclick="setCell('${sid}',${day},'form')"><i class="ti ti-school"></i> Formation</button></div></div>`);
}
function setCell(sid,day,val){planData[sid][day]=val;document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast('Affectation ajoutée','ok','ti-calendar-check');}
function removeCell(sid,day){planData[sid][day]=null;render();toast('Affectation retirée');}
function autoPlan(){const open=chantiers.filter(c=>['cours','prep'].includes(c.statut));salaries.forEach(s=>{planData[s.id]=planData[s.id].map((k,d)=>{if(k||d>4)return k;if(badDay(d))return k;return s.equipe?null:(open.find(c=>c.equipe.includes(s.id))||open[0]).id;});});salaries.forEach(s=>{for(let d=0;d<5;d++){if(!planData[s.id][d]&&!badDay(d)){const c=open.find(x=>x.equipe.includes(s.id));if(c)planData[s.id][d]=c.id;}}});render();toast('Planning pré-rempli selon les équipes','ok','ti-wand');}

function toggleStep(ref,i){const d=dossier(ref);d.steps[i]=d.steps[i]?0:1;render();const o=document.querySelector('.overlay');if(o){o.remove();openDossier(ref);}toast(d.steps[i]?STEPS[i][0]+' ✓':STEPS[i][0]+' annulé',d.steps[i]?'ok':'info',d.steps[i]?'ti-check':'ti-rotate');}

  modal(`<div class="modal-head"><h3>Nouveau dossier</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div class="field"><label>Client (existant ou nouveau)</label><input id="ndNom" list="ndClients" placeholder="Tapez ou choisissez un client"><datalist id="ndClients">${clients.map(c=>`<option value="${c.nom.replace(/"/g,'')}">`).join('')}</datalist></div>

    <div style="display:flex;gap:12px"><div class="field" style="flex:1"><label>Statut</label><select id="ndSt">${CORDER.map(k=>`<option value="${k}">${CSTAT[k][0]}</option>`).join('')}</select></div><div class="field" style="flex:1"><label>Chef d'équipe</label><select id="ndChef"><option value="">— Non affecté —</option>${Object.keys(chefCol).map(c=>`<option>${c}</option>`).join('')}</select></div></div>
    <div class="field"><label>Échéance (note)</label><input id="ndDate" placeholder="Ex. Sept. 2026"></div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="creerDossier()"><i class="ti ti-check"></i> Ajouter au carnet</button>
  </div>`);
  if(pref){const e=document.getElementById('ndNom');if(e)e.value=pref;}

function creerDossier(){
  const nom=document.getElementById('ndNom').value.trim();
  if(!nom){toast('Indiquez le client / chantier','info','ti-alert-circle');return;}
  carnet.unshift({ref:'DE0'+(2420+carnet.length),client:nom,clientId:findOrCreateClient(nom),st:document.getElementById('ndSt').value,ht:+document.getElementById('ndHT').value||0,h:+document.getElementById('ndH').value||0,chef:document.getElementById('ndChef').value,date:document.getElementById('ndDate').value||'—',steps:[0,0,0,0,0],memo:''});
  autoDevisFait(nom);
  document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast('Dossier ajouté au carnet','ok','ti-notebook');
}

/* --- Assistant de planification (synergie carnet → équipe → calendrier) --- */
let assist=null;
const recoHauteur=s=>s.habil.some(h=>h.toLowerCase().includes('hauteur')&&!h.toLowerCase().includes('formation'));
const chargeSem=s=>planData[s.id].filter(isCh).length;
function planifierDossier(ref){
  const d=dossier(ref);
  const ranked=[...salaries].sort((a,b)=>(recoHauteur(b)-recoHauteur(a))||(chargeSem(a)-chargeSem(b)));
  assist={ref,sel:new Set(ranked.filter(recoHauteur).slice(0,2).map(s=>s.id)),date:'2026-07-06'};
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  modal('<div id="assistWrap"></div>');drawAssist();
}
function assistToggle(id){assist.sel.has(id)?assist.sel.delete(id):assist.sel.add(id);drawAssist();}
function assistDate(v){assist.date=v;}
function drawAssist(){
  const d=dossier(assist.ref),n=assist.sel.size,jours=n?Math.ceil(d.h/(n*7)):0;
  document.getElementById('assistWrap').innerHTML=`
  <div class="modal-head"><div><h3 style="font-size:18px">Planifier le chantier</h3><div class="muted" style="font-size:12.5px">${d.client} · ${d.h} h à réaliser</div></div><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div class="banner" style="margin-bottom:16px;background:rgba(243,146,0,.12);color:var(--orange-dark)"><i class="ti ti-bulb"></i> ${d.h} h à répartir · avec <b>${n}</b> personne${n>1?'s':''} → ≈ <b>${jours||'—'} jour${jours>1?'s':''}</b> de chantier (base 7 h/j).</div>
    <div class="field"><label>Date de démarrage</label><input type="date" value="${assist.date}" onchange="assistDate(this.value)"></div>
    <div class="tiny" style="font-weight:700;margin:6px 0 8px">ÉQUIPE SUGGÉRÉE — selon compétences (travail en hauteur) & charge actuelle</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${salaries.map(s=>{const on=assist.sel.has(s.id),rc=recoHauteur(s),l=chargeSem(s);
        return `<button onclick="assistToggle('${s.id}')" style="display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1.5px solid ${on?'var(--orange)':'var(--line)'};background:${on?'rgba(243,146,0,.07)':'var(--surface)'};border-radius:12px;padding:11px 13px;cursor:pointer">
          <span class="avatar-sm" style="background:${s.col}">${s.init}</span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13.5px">${s.nom} ${rc?'<span class="tag" style="background:rgba(122,139,79,.16);color:var(--olive);font-size:9.5px"><i class="ti ti-star" style="font-size:10px"></i> recommandé</span>':'<span class="tag" style="background:rgba(232,181,71,.18);color:#a9760d;font-size:9.5px">hauteur en formation</span>'}</div>

function validerPrep(){
  const c=chn(prepState.cid),d=dossier(prepState.ref);let nbStock=0,nbSpec=0;c.stockAlloc=c.stockAlloc||[];
  Object.entries(prepState.alloc).forEach(([i,q])=>{q=+q;if(q>0){const s=stock[+i];const take=Math.min(q,s.qte);if(take>0){s.qte-=take;c.stockAlloc.push({nom:s.nom,qte:take,u:s.u});nbStock++;}}});
  prepState.special.forEach(p=>{if((p.desc||'').trim()&&p.qte>0){demandesList.unshift({id:'dm'+Date.now()+Math.floor(Math.random()*999),titre:'Pièce spéciale — '+p.desc+' (×'+p.qte+') · '+c.nom,who:c.chef||'km',due:"Aujourd'hui",type:'mat'});nbSpec++;}});
  d.steps[4]=1;c.statut='prep';document.querySelectorAll('.overlay').forEach(o=>o.remove());render();
  toast('Préparation validée'+(nbStock?' · '+nbStock+' lot(s) réservé(s)':'')+(nbSpec?' · '+nbSpec+' pièce(s) commandée(s)':''),'ok','ti-package');

    .ag-ev b{font-size:11.5px}
  </style>
  <div class="page-head"><div><h1>Agenda — visites & RDV</h1><p>Calendrier du bureau · réunions, visites chantier, métrés, relances · distinct du planning des chantiers</p></div>
    <div style="display:flex;gap:8px;align-items:center">

function saveRDV(){

  rdvs.push({id:'r'+(rdvSeq++),week:agendaWeek,day:+_v('rvDay'),start:+_v('rvHour'),dur:+_v('rvDur'),type:_v('rvType'),titre:_v('rvTitre')||RTYPE[_v('rvType')][0],client:_v('rvClient'),whos});

      ${cl.note?`<div style="margin-top:9px;font-size:12.5px;background:var(--surface);border-radius:9px;padding:9px"><b>Notes :</b> ${cl.note}</div>`:''}

function delRDV(id){rdvs=rdvs.filter(x=>x.id!==id);document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast('Rendez-vous supprimé');}
function _reRDV(id){document.querySelectorAll('.overlay').forEach(o=>o.remove());render();openRDV(id);}
function addParticipant(id,mid){const r=rdvs.find(x=>x.id===id);if(!r)return;if(!r.whos)r.whos=rdvParts(r).slice();if(!r.whos.includes(mid))r.whos.push(mid);_reRDV(id);toast((buro(mid)||{}).nom?'Ajouté : '+buro(mid).nom.split(' ')[0]:'Participant ajouté','ok','ti-user-plus');}
function removeParticipant(id,mid){const r=rdvs.find(x=>x.id===id);if(!r)return;if(!r.whos)r.whos=rdvParts(r).slice();r.whos=r.whos.filter(x=>x!==mid);_reRDV(id);toast('Participant retiré');}

function _syncCurDevis(){if(!currentDevis||!Array.isArray(devisDossiers))return;const d=devisDossiers.find(x=>x.id===currentDevis);if(d){d.lignes=devisLignes.slice();d.clientId=devisClient;d.maj=Date.now();}}
function _migrateDevis(){if(!Array.isArray(devisDossiers)||devisDossiers.length)return;devisDossiers.push({id:'dv'+Date.now(),ref:'D-2026-0142',statut:'brouillon',clientId:devisClient||'',lignes:devisLignes.slice(),maj:Date.now()});_devisSeq=Math.max(_devisSeq,142);}
function _dossierTotal(d){return ((d&&d.lignes)||[]).reduce((a,l)=>a+(+l.qte||0)*(+l.pu||0),0);}
function openDevisDossier(id){const d=devisDossiers.find(x=>x.id===id);if(!d)return;_syncCurDevis();currentDevis=id;devisLignes.length=0;(d.lignes||[]).forEach(l=>devisLignes.push(l));devisClient=d.clientId||'';view='devis';renderNav();render();}
function newDevis(){_syncCurDevis();const n=(++_devisSeq);const id='dv'+Date.now();devisDossiers.unshift({id,ref:'D-2026-0'+n,statut:'brouillon',clientId:'',lignes:[],maj:Date.now()});currentDevis=id;devisLignes.length=0;devisClient='';view='devis';render();toast('Nouveau devis créé — ajoute tes ouvrages','ok','ti-file-plus');}
function backToDevisList(){_syncCurDevis();currentDevis=null;render();}
function delDevisDossier(id){if(!confirm('Supprimer définitivement ce devis ?'))return;const i=devisDossiers.findIndex(x=>x.id===id);if(i<0)return;devisDossiers.splice(i,1);if(currentDevis===id){currentDevis=null;devisLignes.length=0;devisClient='';}render();toast('Devis supprimé','info','ti-trash');}
function _curDoss(){return devisDossiers.find(x=>x.id===currentDevis)||{};}
function renameDevis(id){const d=devisDossiers.find(x=>x.id===id);if(!d)return;modal(`<div class="modal-head"><h3>Renommer le devis</h3><button class="icon-x" onclick="this.closest('.overlay').remove()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="field"><label>Nom du devis</label><input id="rnDevis" class="cell" style="width:100%" value="${(d.titre||'').replace(/"/g,'&quot;')}" placeholder="Ex. Toiture Villa Dupont" onkeydown="if(event.key==='Enter')_saveRenameDevis('${id}')"></div><div class="tiny" style="color:var(--ink-3);margin-bottom:12px">Référence ${d.ref} conservée. Laisse vide pour revenir à la référence.</div><button class="btn primary" style="width:100%;justify-content:center" onclick="_saveRenameDevis('${id}')"><i class="ti ti-check"></i> Enregistrer</button></div>`);setTimeout(()=>{const i=document.getElementById('rnDevis');if(i){i.focus();i.select();}},50);}
function _saveRenameDevis(id){const d=devisDossiers.find(x=>x.id===id);if(!d)return;d.titre=(_v('rnDevis')||'').trim();document.querySelectorAll('.overlay').forEach(o=>o.remove());render();toast('Devis renommé','ok','ti-check');}
function dupDevis(id){const d=devisDossiers.find(x=>x.id===id);if(!d)return;_syncCurDevis();const n=(++_devisSeq);const nid='dv'+Date.now();let lignes=[];try{lignes=JSON.parse(JSON.stringify(d.lignes||[]));}catch(e){lignes=(d.lignes||[]).slice();}devisDossiers.unshift({id:nid,ref:'D-2026-0'+n,statut:'brouillon',titre:(d.titre?d.titre+' (copie)':''),clientId:d.clientId||'',lignes,maj:Date.now()});render();toast('Devis dupliqué — copie créée','ok','ti-copy');}

function setDevisStatutFilter(s){_devisStatutFilter=s;document.querySelectorAll('.dstat-chip').forEach(c=>c.classList.toggle('on',c.dataset.s===s));_devisFilter();}
function _devisFilter(){const qi=document.getElementById('devisSearch');const qq=((qi&&qi.value)||'').toLowerCase().trim();const grid=document.getElementById('devisListGrid');if(!grid)return;let visible=0;Array.prototype.forEach.call(grid.querySelectorAll('.devis-card'),c=>{const okQ=!qq||(c.dataset.search||'').indexOf(qq)>=0;const okS=(_devisStatutFilter==='all')||(c.dataset.statut===_devisStatutFilter);const show=okQ&&okS;c.style.display=show?'':'none';if(show)visible++;});const nr=document.getElementById('devisNoResult');if(nr)nr.style.display=visible?'none':'block';}

    ${dc?`<div style="flex:1.5;min-width:230px;background:var(--surface-2);border-radius:11px;padding:13px"><div class="tiny" style="font-weight:700"><i class="ti ti-notes"></i> NOTES DU RDV / VISITE</div><div style="font-size:12.5px;margin-top:5px">${dc.note||'Aucune note de visite.'}</div>${rdvN.length?rdvN.map(r=>`<div class="tiny" style="margin-top:5px;color:var(--bleu-mer)"><i class="ti ti-calendar"></i> ${['Lun','Mar','Mer','Jeu','Ven','Sam'][r.day]} ${r.start}h — ${r.titre}</div>`).join(''):'<div class="tiny" style="margin-top:5px;color:var(--ink-3)">Aucune visite planifiée.</div>'}</div>`:'<div style="flex:1.5;min-width:230px;color:var(--ink-3);font-size:13px;align-self:center">Sélectionnez un client pour pré-remplir l\'en-tête du devis et afficher les notes de visite.</div>'}

        <div class="card-pad" style="display:flex;flex-direction:column;gap:14px">${cats.map(cat=>`<div><div class="tiny" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);margin-bottom:8px">${cat}</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">${ouvrages.filter(o=>(o.cat||'Autres')===cat).map(ocard).join('')}</div></div>`).join('')}</div></div>

        <div id="devMargeBox" style="display:flex;flex-wrap:wrap;gap:18px;align-items:center;padding:10px 14px;margin:0 0 4px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;font-size:12.5px">${_margeBoxHTML(devisTotals())}</div>
        <div id="devisBody" style="display:flex;flex-direction:column;gap:14px">${[...new Set(devisLignes.map(l=>l.cat||'Divers'))].map(cat=>`<div><div class="tiny" style="font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--orange-dark);margin:2px 0 8px;display:flex;align-items:center;gap:6px"><i class="ti ti-folder"></i> ${cat}</div><div style="display:flex;flex-direction:column;gap:10px">${devisLignes.map((l,i)=>({l,i})).filter(x=>(x.l.cat||'Divers')===cat).map(({l,i})=>{const det=(l.ovId||l.h||(l.four&&l.four.length));const moT=(+l.h||0)*(+l.taux||tauxMO);const compo=Math.round((moT+(l.four||[]).reduce((s,f)=>s+(+f.qte||0)*(+f.pu||0),0))*100)/100;return `<div style="border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:var(--surface)"><div style="display:flex;align-items:flex-start;gap:10px"><div style="flex:1;min-width:0"><input class="cell" style="width:100%;font-weight:700;font-size:14px;border:none;padding:4px 2px;background:transparent" value="${(l.des||'').replace(/"/g,'&quot;')}" data-i="${i}" data-f="des" placeholder="Désignation de la prestation"><textarea class="cell descr-ta" rows="1" style="width:100%;margin-top:3px;font-size:11.5px;color:var(--ink-2);resize:vertical;overflow:hidden;min-height:26px;height:26px;line-height:1.4;font-family:inherit;border:none;padding:2px;background:transparent" data-i="${i}" data-f="descr" placeholder="Description (visible sur le devis)…" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${(l.descr||'').replace(/</g,'&lt;')}</textarea></div><div style="text-align:right;flex-shrink:0"><div class="tiny" style="color:var(--ink-3)">Total ligne</div><div id="ltot-${i}" style="font-weight:800;font-size:18px;font-family:'Baloo 2';color:var(--orange-dark)">${fmt(l.qte*l.pu)}</div></div><div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0"><button class="icon-x" style="width:28px;height:23px" title="Monter l'ouvrage" onclick="devisLineMove(${i},-1)"><i class="ti ti-chevron-up"></i></button><button class="icon-x" style="width:28px;height:23px" title="Descendre l'ouvrage" onclick="devisLineMove(${i},1)"><i class="ti ti-chevron-down"></i></button></div><button class="icon-x" data-del="${i}" title="Supprimer la ligne" style="flex-shrink:0"><i class="ti ti-trash"></i></button></div>${det?`<div style="margin-top:9px;border:1px solid var(--line);border-radius:10px;overflow:hidden"><div class="compo-head" style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface-2);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3)"><span style="flex:1;min-width:0">Composition · pour 1 ${l.u}</span><span style="width:52px;text-align:center">Qté</span><span style="width:28px"></span><span style="width:10px"></span><span style="width:52px;text-align:center">P.U.</span><span style="width:16px"></span><span style="width:56px;text-align:right">Total</span><span style="width:22px"></span></div><div style="background:rgba(61,138,198,.06);border-bottom:1px solid var(--line)"><div class="compo-row" style="display:flex;align-items:center;gap:6px;padding:7px 10px 2px"><span class="compo-name" style="flex:1;min-width:0;font-size:12px;font-weight:700;color:var(--bleu-mer)"><i class="ti ti-clock"></i> Main d'œuvre</span><input class="cell noarrow" type="text" inputmode="decimal" value="${l.h||0}" onchange="devisLineSet(${i},'h',this.value)" style="width:52px;text-align:center" title="heures par ${l.u}"><span class="tiny" style="width:28px;color:var(--ink-3)">h</span><span style="width:10px;text-align:center;color:var(--ink-3)">×</span><input class="cell noarrow" type="text" inputmode="decimal" value="${l.taux||tauxMO}" onchange="devisLineSet(${i},'taux',this.value)" style="width:52px;text-align:center" title="taux horaire (€/h)"><span class="tiny" style="width:16px;color:var(--ink-3)">€</span><span style="width:56px;text-align:right;font-weight:700;font-size:12px">${fmt(moT)}</span><span style="width:22px"></span></div><div style="text-align:right;font-size:10px;padding:0 34px 5px"><span style="color:#B5651D">déb. ${fmt((+l.h||0)*coutMO)}</span> · <span style="color:${((+l.h||0)*((+l.taux||tauxMO)-coutMO))>=0?'var(--olive)':'var(--alerte)'};font-weight:700">marge ${((+l.h||0)*((+l.taux||tauxMO)-coutMO))>=0?'+':''}${fmt((+l.h||0)*((+l.taux||tauxMO)-coutMO))}</span></div></div>${(l.four||[]).map((f,pi)=>`<div style="border-bottom:1px solid var(--line)"><div class="compo-row" style="display:flex;align-items:center;gap:6px;padding:7px 10px 2px"><span class="compo-name" style="flex:1;min-width:0;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><i class="ti ti-package" style="color:var(--orange);font-size:13px"></i> ${f.nom}</span><input class="cell noarrow" type="text" inputmode="decimal" value="${f.qte}" onchange="devisProdSet(${i},${pi},'qte',this.value)" style="width:52px;text-align:center" title="quantité par ${l.u}"><span class="tiny" style="width:28px;color:var(--ink-3)">${f.u}</span><span style="width:10px;text-align:center;color:var(--ink-3)">×</span><input class="cell noarrow" type="text" inputmode="decimal" value="${f.pu}" onchange="devisProdSet(${i},${pi},'pu',this.value)" style="width:52px;text-align:center" title="prix unitaire (€)"><span class="tiny" style="width:16px;color:var(--ink-3)">€</span><span style="width:56px;text-align:right;font-weight:700;font-size:12px">${fmt((+f.qte||0)*(+f.pu||0))}</span><button class="icon-x" onclick="devisProdDel(${i},${pi})" title="Retirer" style="width:22px;flex-shrink:0"><i class="ti ti-x"></i></button></div><div style="text-align:right;font-size:10px;padding:0 34px 5px"><span style="color:#B5651D">déb. ${fmt((+f.qte||0)*((catF(f.fid)||{achat:0}).achat||0))}</span> · <span style="color:${((+f.qte||0)*((+f.pu||0)-((catF(f.fid)||{achat:0}).achat||0)))>=0?'var(--olive)':'var(--alerte)'};font-weight:700">marge ${((+f.qte||0)*((+f.pu||0)-((catF(f.fid)||{achat:0}).achat||0)))>=0?'+':''}${fmt((+f.qte||0)*((+f.pu||0)-((catF(f.fid)||{achat:0}).achat||0)))}</span></div></div>`).join('')}<div class="compo-calc" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-2)"><button class="btn sm ghost" onclick="devisLineAddProd(${i})"><i class="ti ti-plus"></i> Ajouter un produit</button><span style="font-size:12px;font-weight:700;color:var(--ink-2)">Prix calculé : <span style="color:var(--orange-dark)">${fmt(compo)}</span> / ${l.u}${(Math.abs((+l.pu||0)-compo)>0.5)?` <span class="tiny" style="color:var(--ink-3);font-weight:600">· P.U. ajusté à ${l.pu} €</span>`:''}</span></div></div>`:''}<div style="display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);flex-wrap:wrap"><span class="tiny" style="font-weight:700;color:var(--ink-2)">Quantité</span><input class="cell noarrow" type="text" inputmode="decimal" style="width:62px;text-align:center;font-weight:700" value="${l.qte}" data-i="${i}" data-f="qte"><input class="cell" style="width:48px;text-align:center" value="${l.u}" data-i="${i}" data-f="u"><span style="color:var(--ink-3)">×</span><span class="tiny" style="font-weight:700;color:var(--ink-2)">P.U.</span><input class="cell noarrow" type="text" inputmode="decimal" style="width:68px;text-align:center;font-weight:700" value="${l.pu}" data-i="${i}" data-f="pu"><span class="tiny" style="color:var(--ink-3)">€ / ${l.u}</span>${det?'':`<span class="tiny" style="color:var(--ink-3);margin-left:2px">prix libre</span>`}</div><div id="lmarge-${i}" style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:11.5px">${_lineMargeHTML(l)}</div></div>`}).join('')}</div></div>`).join('')}</div></div>
    </div>

      <div class="card" style="padding:0;overflow:hidden;box-shadow:var(--shadow-l)"><div id="devisPreview">${devisPreviewHTML()}</div></div>

      <div style="display:flex;gap:10px;margin-top:10px"><button class="btn" style="flex:1;justify-content:center" onclick="exportDevisPDF()"><i class="ti ti-download"></i> PDF</button><button class="btn primary" style="flex:1.4;justify-content:center" onclick="devisToFacture()"><i class="ti ti-arrow-right"></i> → Facture d'acompte</button></div>
    </div>
  </div></div>`;
};
function _lineCout(l){return (+l.h||0)*coutMO+(l.four||[]).reduce((a,f)=>a+((catF(f.fid)||{achat:0}).achat||0)*(+f.qte||0),0);}
function devisTotals(){let st=0,cout=0;devisLignes.forEach(l=>{const q=+l.qte||0;st+=q*(+l.pu||0);cout+=q*_lineCout(l);});return {st,cout,marge:st-cout,tva:st*0.1,ttc:st*1.1};}

function _lineRecalc(i){const l=devisLignes[i];if(!l)return;const mat=(l.four||[]).reduce((s,f)=>s+(+f.qte||0)*(+f.pu||0),0);l.pu=Math.round(((+l.h||0)*(+l.taux||tauxMO)+mat)*100)/100;render();}
